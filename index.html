<!DOCTYPE html>
<html>
<head>
    <title>Smart Solar Calculator</title>

    <style>
        body {
            font-family: Arial;
            background: #1e3c72;
            color: white;
            text-align: center;
        }

        .box {
            background: white;
            color: black;
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
        }

        input, select, button {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            background: #2a5298;
            color: white;
            border: none;
        }

        .result {
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>

<body>

<h1>☀ Solar Energy Calculator</h1>

<div class="box">

    <input type="number" id="units" placeholder="Daily energy (kWh)">
    <input type="number" id="sunlight" placeholder="Sunlight hours">

    <select id="panelType">
        <option value="0.3">300W Panel</option>
        <option value="0.4">400W Panel</option>
        <option value="0.55">550W Panel</option>
    </select>

    <label>
        <input type="checkbox" id="batteryToggle" checked>
        Include Battery
    </label>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>

</div>

<script>
function calculate() {

    // GET VALUES (FORCE NUMBER)
    var units = Number(document.getElementById("units").value);
    var sunlight = Number(document.getElementById("sunlight").value);
    var panelPower = Number(document.getElementById("panelType").value);
    var batteryIncluded = document.getElementById("batteryToggle").checked;

    // VALIDATION
    if (!units || !sunlight) {
        document.getElementById("result").innerHTML = "Enter valid values";
        return;
    }

    // CALCULATIONS
    var panels = Math.ceil(units / (panelPower * sunlight));
    var area = panels * 2;

    var panelCost = panels * 20000;
    var inverterCost = 30000;
    var installationCost = panelCost * 0.15;
    var batteryCost = batteryIncluded ? panels * 3000 : 0;

    var totalCost = panelCost + inverterCost + installationCost + batteryCost;

    var yearlySavings = units * 365 * 8;
    var payback = totalCost / yearlySavings;

    // OUTPUT
    document.getElementById("result").innerHTML =
        "Panels Required: " + panels + "<br><br>" +
        "Area: " + area + " m²<br><br>" +
        "Panel Cost: ₹" + panelCost + "<br>" +
        "Inverter: ₹" + inverterCost + "<br>" +
        "Installation: ₹" + Math.ceil(installationCost) + "<br>" +
        "Battery: ₹" + batteryCost + "<br><br>" +
        "<b>Total Cost: ₹" + Math.ceil(totalCost) + "</b><br><br>" +
        "Payback: " + payback.toFixed(1) + " years";
}
</script>

</body>
</html>
