<!DOCTYPE html>
<html>
<head>
    <title>Smart Solar Energy Calculator</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 40px;
        }

        p {
            opacity: 0.9;
        }

        .container {
            margin-top: 30px;
            background: white;
            color: black;
            padding: 30px;
            width: 360px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        input, select {
            padding: 12px;
            margin: 10px;
            width: 85%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            width: 90%;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            font-size: 16px;
            text-align: left;
        }

        label {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>☀ Smart Solar Energy Calculator</h1>
    <p>Plan your solar setup using real-world parameters</p>

    <div class="container">

        <input type="number" id="units" placeholder="Daily energy (kWh)">
        <input type="number" id="sunlight" placeholder="Sunlight hours">

        <select id="panelType">
            <option value="0.3">300W Panel</option>
            <option value="0.4">400W Panel</option>
            <option value="0.55" selected>550W Panel</option>
        </select>

        <label>
            <input type="checkbox" id="batteryToggle" checked>
            Include Battery Storage
        </label>

        <button onclick="calculate()">Calculate</button>

        <div class="result" id="result"></div>

    </div>

    <script>
        function calculate() {

            let units = document.getElementById("units").value;
            let sunlight = document.getElementById("sunlight").value;
            let panelPower = document.getElementById("panelType").value;
            let batteryIncluded = document.getElementById("batteryToggle").checked;

            if(units === "" || sunlight === "") {
                document.getElementById("result").innerHTML = "⚠ Enter all values";
                return;
            }

            let panels = units / (panelPower * sunlight);
            panels = Math.ceil(panels);

            let areaPerPanel = 2;
            let totalArea = panels * areaPerPanel;

            let panelCostPerUnit = 20000;
            let panelCost = panels * panelCostPerUnit;

            let inverterCost = 30000;
            let installationCost = panelCost * 0.15;

            let batteryCost = batteryIncluded ? panels * 3000 : 0;

            let totalCost = panelCost + inverterCost + installationCost + batteryCost;

            let electricityRate = 8;
            let yearlySavings = units * 365 * electricityRate;
            let paybackYears = totalCost / yearlySavings;

            document.getElementById("result").innerHTML =
                "🔢 Panels Required: <b>" + panels + "</b><br><br>" +
                "📏 Area Required: <b>" + totalArea + " m²</b><br><br>" +
                "💰 Panel Cost: ₹" + panelCost + "<br>" +
                "⚡ Inverter Cost: ₹" + inverterCost + "<br>" +
                "🔧 Installation: ₹" + Math.ceil(installationCost) + "<br>" +
                "🔋 Battery: ₹" + batteryCost + "<br><br>" +
                "💸 <b>Total Cost: ₹" + Math.ceil(totalCost) + "</b><br><br>" +
                "📉 Payback Period: <b>" + paybackYears.toFixed(1) + " years</b>";
        }
    </
