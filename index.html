<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Solar Energy Calculator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 50px auto;
      background: white;
      color: black;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    h1 {
      margin-top: 30px;
      font-size: 32px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #2a5298;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1d3f7a;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin: 10px 0 15px 0;
    }

    .checkbox-row input {
      width: auto;
      margin: 0;
    }

    #result {
      margin-top: 20px;
      text-align: left;
      line-height: 1.8;
      font-size: 16px;
    }

    .note {
      font-size: 14px;
      opacity: 0.9;
      margin-top: -10px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>☀ Smart Solar Energy Calculator</h1>

  <div class="container">
    <input type="number" id="units" placeholder="Daily energy required (kWh)" />
    <input type="number" id="sunlight" placeholder="Peak sunlight hours per day" />

    <select id="panelType">
      <option value="0.3">300W Panel</option>
      <option value="0.4">400W Panel</option>
      <option value="0.55" selected>550W Panel</option>
    </select>

    <div class="checkbox-row">
      <input type="checkbox" id="batteryToggle" checked />
      <label for="batteryToggle">Include Battery Storage</label>
    </div>

    <button type="button" onclick="calculateSolar()">Calculate</button>

    <div id="result"></div>
  </div>

  <script>
    function calculateSolar() {
      var units = parseFloat(document.getElementById("units").value);
      var sunlight = parseFloat(document.getElementById("sunlight").value);
      var panelPower = parseFloat(document.getElementById("panelType").value);
      var batteryIncluded = document.getElementById("batteryToggle").checked;

      if (isNaN(units) || isNaN(sunlight) || units <= 0 || sunlight <= 0) {
        document.getElementById("result").innerHTML =
          "<b>Please enter valid positive values.</b>";
        return;
      }

      var panels = Math.ceil(units / (panelPower * sunlight));
      var areaRequired = panels * 2;

      var panelCostPerPanel = 20000;
      var panelCost = panels * panelCostPerPanel;

      var inverterCost = 30000;
      var installationCost = Math.ceil(panelCost * 0.15);
      var batteryCost = batteryIncluded ? panels * 3000 : 0;

      var totalCost = panelCost + inverterCost + installationCost + batteryCost;

      var electricityRate = 8;
      var yearlySavings = units * 365 * electricityRate;
      var paybackYears = totalCost / yearlySavings;

      document.getElementById("result").innerHTML =
        "<b>Panels Required:</b> " + panels + "<br>" +
        "<b>Area Required:</b> " + areaRequired + " m²<br>" +
        "<b>Panel Cost:</b> ₹" + panelCost + "<br>" +
        "<b>Inverter Cost:</b> ₹" + inverterCost + "<br>" +
        "<b>Installation Cost:</b> ₹" + installationCost + "<br>" +
        "<b>Battery Cost:</b> ₹" + batteryCost + "<br><br>" +
        "<b>Total Estimated Cost:</b> ₹" + totalCost + "<br>" +
        "<b>Estimated Payback Period:</b> " + paybackYears.toFixed(1) + " years";
    }
  </script>

</body>
</html>
