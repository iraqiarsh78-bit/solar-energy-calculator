<!DOCTYPE html>
<html>
<head>
    <title>Smart Solar Energy Calculator</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 80px;
            background: white;
            color: black;
            padding: 30px;
            width: 350px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 40px;
        }

        input, select {
            padding: 12px;
            margin: 10px;
            width: 85%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px;
            width: 90%;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>☀ Smart Solar Energy Calculator</h1>

    <div class="container">

        <input type="number" id="units" placeholder="Daily energy (kWh)">
        <input type="number" id="sunlight" placeholder="Sunlight hours">

        <select id="panelType">
            <option value="0.3">300W Panel</option>
            <option value="0.4">400W Panel</option>
            <option value="0.55">550W Panel</option>
        </select>

        <button onclick="calculate()">Calculate</button>

        <div class="result" id="result"></div>

    </div>

    <script>
        function calculate() {

            let units = document.getElementById("units").value;
            let sunlight = document.getElementById("sunlight").value;
            let panelPower = document.getElementById("panelType").value;

            if(units === "" || sunlight === "") {
                document.getElementById("result").innerHTML = "⚠ Enter all values";
                return;
            }

            let panels = units / (panelPower * sunlight);

            let areaPerPanel = 2; // m² approx
            let totalArea = panels * areaPerPanel;

            let cost = panels * 15000;

            document.getElementById("result").innerHTML =
                "🔢 Panels Required: <b>" + Math.ceil(panels) + "</b><br><br>" +
                "📏 Total Area Needed: <b>" + Math.ceil(totalArea) + " m²</b><br><br>" +
                "💰 Estimated Cost: <b>₹" + Math.ceil(cost) + "</b>";
        }
    </script>

</body>
</html>
