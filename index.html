<!DOCTYPE html>
<html>
<head>
    <title>Solar Energy Calculator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>Solar Energy Calculator</h2>

        <input type="number" id="units" placeholder="Daily units (kWh)">
        <input type="number" id="sunlight" placeholder="Sunlight hours">

        <button onclick="calculate()">Calculate</button>

        <h3 id="result"></h3>
    </div>

    <script>
        function calculate() {
            let units = document.getElementById("units").value;
            let sunlight = document.getElementById("sunlight").value;

            if(units === "" || sunlight === "") {
                document.getElementById("result").innerText = "Enter all values";
                return;
            }

            let panelOutput = 0.3; 
            let panels = units / (panelOutput * sunlight);

            document.getElementById("result").innerText =
                "Panels Required: " + Math.ceil(panels);
        }
    </script>

</body>
</html>
